<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werewolf Moderator Assistant (Custom Roles)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="text-center mb-8 border-b border-slate-700 pb-4">
            <h1 class="text-3xl font-bold text-red-500 tracking-wider">🐺 WEREWOLF MODERATOR</h1>
            <p class="text-slate-400 text-sm mt-1">ระบบช่วยควบคุมเกมแบบกำหนดบทบาทและผู้เล่นเองทั้งหมด</p>
        </header>

        <div id="setup-view" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="bg-slate-800 p-6 rounded-xl shadow-lg border border-slate-700 space-y-4">
                <h2 class="text-xl font-semibold text-amber-400 flex items-center gap-2">🃏 1. จัดการคลังบทบาทในระบบ</h2>
                
                <div class="p-4 bg-slate-900/50 rounded-lg border border-slate-700 space-y-3">
                    <div class="text-xs font-bold text-slate-400 uppercase">เพิ่มบทบาทใหม่ในเกมของคุณ</div>
                    <input id="role-name-input" type="text" placeholder="ชื่อบทบาท (เช่น บอดี้การ์ด 🛡️)" class="w-full bg-slate-700 text-white px-3 py-1.5 text-sm rounded focus:outline-none focus:ring-2 focus:ring-amber-500">
                    
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-[11px] text-slate-400 block mb-1">เลือกฝ่าย/ทีม</label>
                            <select id="role-team-input" class="w-full bg-slate-700 text-white px-2 py-1.5 text-sm rounded focus:outline-none">
                                <option value="Villager">ชาวบ้าน (Villager)</option>
                                <option value="Werewolf">หมาป่า (Werewolf)</option>
                                <option value="Solo">ฝ่ายที่สาม (Solo/Third Party)</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[11px] text-slate-400 block mb-1">ลำดับตื่นตอนกลางคืน</label>
                            <select id="role-priority-input" class="w-full bg-slate-700 text-white px-2 py-1.5 text-sm rounded focus:outline-none">
                                <option value="1">ตื่นกลุ่มแรก (เช่น หมาป่า)</option>
                                <option value="2">ตื่นกลุ่มสอง
